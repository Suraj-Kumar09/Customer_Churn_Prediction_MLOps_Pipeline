name: workflow

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # 1. Repository ka code fetch karein
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Docker Buildx setup karein (Build optimization ke liye)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 3. Docker Hub mein login karein
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4. Docker Image build aur push karein
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/churn-app:latest
          # Build process ko fast banane ke liye caching
          cache-from: type=gha
          cache-to: type=gha,mode=max